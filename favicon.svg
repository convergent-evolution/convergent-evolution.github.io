<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#990000"/>
  <g stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Cladogram trunk + two splits -->
    <path d="M 32 56 L 32 46"/>
    <path d="M 16 46 L 48 46"/>
    <path d="M 16 46 L 16 40"/>
    <path d="M 48 46 L 48 40"/>
    <path d="M 10 40 L 22 40"/>
    <path d="M 42 40 L 54 40"/>

    <!-- Four terminal leaves as Fourier basis components: (1, 8, 4, 2) half-cycles. -->
    <!-- Leaf 1: 1 half-cycle (straight, DC term) -->
    <path d="M 10 40 L 10 8"/>
    <!-- Leaf 2: 8 half-cycles, starts bending left -->
    <path d="M 22 40 Q 20 38 22 36 T 22 32 T 22 28 T 22 24 T 22 20 T 22 16 T 22 12 T 22 8"/>
    <!-- Leaf 3: 4 half-cycles -->
    <path d="M 42 40 Q 45 36 42 32 T 42 24 T 42 16 T 42 8"/>
    <!-- Leaf 4: 2 half-cycles -->
    <path d="M 54 40 Q 50 32 54 24 T 54 8"/>
  </g>
</svg>
